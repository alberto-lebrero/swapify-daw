spring.application.name=swapify

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/swapify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Sesión: duración de una semana (604800 segundos)
server.servlet.session.timeout=604800s
