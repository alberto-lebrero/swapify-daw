<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/partner_exchange/default/24px.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar perfil</title>
    <link rel="stylesheet" th:href="@{/css/profile-edit.css}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/header :: header}"></div>

    <main class="profile-main">
        <div class="edit-card">

            <!-- ── Cabecera con volver ────────────────────────────────────── -->
            <div class="edit-header">
                <a th:href="@{/profile}" class="back-btn">
                    <span class="material-icons">arrow_back</span>
                    Volver al perfil
                </a>
                <h1>Editar perfil</h1>
            </div>

            <!-- ── Formulario ─────────────────────────────────────────────── -->
            <form th:action="@{/profile/edit}" th:object="${profileForm}"
                  method="post" class="edit-form" novalidate>

                <!-- Nombre y Apellidos en la misma fila -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">
                            <span class="material-icons">badge</span>
                            Nombre
                        </label>
                        <input type="text" id="firstName" th:field="*{firstName}"
                               th:classappend="${#fields.hasErrors('firstName')} ? ' error'"
                               placeholder="Tu nombre"
                               autocomplete="given-name">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('firstName')}"
                              th:errors="*{firstName}"></span>
                    </div>

                    <div class="form-group">
                        <label for="lastName">
                            <span class="material-icons">badge</span>
                            Apellidos
                        </label>
                        <input type="text" id="lastName" th:field="*{lastName}"
                               th:classappend="${#fields.hasErrors('lastName')} ? ' error'"
                               placeholder="Tus apellidos"
                               autocomplete="family-name">
                        <span class="field-error"
                              th:if="${#fields.hasErrors('lastName')}"
                              th:errors="*{lastName}"></span>
                    </div>
                </div>

                <!-- Ciudad -->
                <div class="form-group">
                    <label for="city">
                        <span class="material-icons">location_on</span>
                        Ciudad
                    </label>
                    <input type="text" id="city" th:field="*{city}"
                           th:classappend="${#fields.hasErrors('city')} ? ' error'"
                           placeholder="¿Dónde estás?"
                           autocomplete="address-level2">
                    <span class="field-error"
                          th:if="${#fields.hasErrors('city')}"
                          th:errors="*{city}"></span>
                </div>

                <!-- URL del avatar -->
                <div class="form-group">
                    <label for="avatarUrl">
                        <span class="material-icons">add_a_photo</span>
                        URL de la foto de perfil
                    </label>
                    <input type="url" id="avatarUrl" th:field="*{avatarUrl}"
                           th:classappend="${#fields.hasErrors('avatarUrl')} ? ' error'"
                           placeholder="https://example.com/mi-foto.jpg">
                    <span class="field-error"
                          th:if="${#fields.hasErrors('avatarUrl')}"
                          th:errors="*{avatarUrl}"></span>
                </div>

                <!-- Biografía -->
                <div class="form-group">
                    <label for="bio">
                        <span class="material-icons">edit_note</span>
                        Sobre mí
                    </label>
                    <textarea id="bio" th:field="*{bio}"
                              th:classappend="${#fields.hasErrors('bio')} ? ' error'"
                              rows="4"
                              placeholder="Cuéntale a la comunidad algo sobre ti..."></textarea>
                    <span class="field-error"
                          th:if="${#fields.hasErrors('bio')}"
                          th:errors="*{bio}"></span>
                </div>

                <!-- Botones de acción -->
                <div class="form-actions">
                    <button type="submit" class="btn-save">
                        <span class="material-icons">save</span>
                        Guardar cambios
                    </button>
                    <a th:href="@{/profile}" class="btn-cancel">
                        <span class="material-icons">close</span>
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
