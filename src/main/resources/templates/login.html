<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/partner_exchange/default/24px.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <a th:href="@{/}" class="auth-logo material-symbols-outlined">partner_exchange</a>
                <h1 class="auth-title">Inicia sesión</h1>
                <p class="auth-subtitle">Bienvenido de nuevo</p>
            </div>

            <!-- Error de negocio (credenciales incorrectas) -->
            <div class="form-alert error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

            <form th:action="@{/users/login}" th:object="${loginForm}"
                  method="post" class="auth-form" novalidate>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? ' error'"
                           placeholder="ejemplo@email.com" autocomplete="email">
                    <span class="field-error" th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? ' error'"
                           placeholder="Escribe tu contraseña" autocomplete="current-password">
                    <span class="field-error" th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>

                <button type="submit" class="btn-primary">Iniciar sesión</button>
            </form>

            <p class="auth-footer">
                ¿No tienes cuenta? <a th:href="@{/users/register}">Regístrate</a>
            </p>
        </div>
    </div>
</body>
</html>
