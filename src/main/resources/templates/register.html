<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/partner_exchange/default/24px.svg" type="image/svg+xml" style="filter: invert(1);">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <a th:href="@{/}" class="auth-logo material-symbols-outlined">partner_exchange</a>
                <h1 class="auth-title">Regístrate</h1>
                <p class="auth-subtitle">Crea tu cuenta</p>
            </div>

            <!-- Error de negocio (email ya registrado, las contraseñas no coinciden) -->
            <div class="form-alert error" th:if="${errorMsg}" th:text="${errorMsg}"></div>

            <form th:action="@{/users/register}" th:object="${registerForm}"
                  method="post" class="auth-form" novalidate>

                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? ' error'"
                           placeholder="Escribe tu nombre" autocomplete="username">
                    <span class="field-error" th:if="${#fields.hasErrors('username')}"
                          th:errors="*{username}"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? ' error'"
                           placeholder="ejemplo@email.com" autocomplete="email">
                    <span class="field-error" th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? ' error'"
                           placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                    <span class="field-error" th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? ' error'"
                           placeholder="Repite tu contraseña" autocomplete="new-password">
                    <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}"
                          th:errors="*{confirmPassword}"></span>
                </div>

                <button type="submit" class="btn-primary">Crear cuenta</button>
            </form>

            <p class="auth-footer">
                ¿Ya tienes cuenta? <a th:href="@{/users/login}">Inicia sesión</a>
            </p>
        </div>
    </div>
</body>
</html>
